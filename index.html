<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>옌이 🐹 제품 링크 모음</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #ebebeb;
      --text: #1a1a1a;
      --text-sub: #888;
      --accent: #ff6b6b;
      --radius: 14px;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 0 16px 80px; }
    .header { padding: 36px 0 20px; text-align: center; }
    .header-emoji { font-size: 36px; margin-bottom: 6px; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .header p { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
    .notice { background: #fffbf0; border: 1px solid #ffe9a0; border-radius: 10px; padding: 10px 14px; font-size: 11px; color: #997a00; margin-bottom: 16px; line-height: 1.6; }
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input { width: 100%; padding: 13px 16px 13px 42px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; background: var(--surface); outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: #bbb; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #bbb; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; background: var(--surface); color: var(--text-sub); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 500; }
    .product-list { display: flex; flex-direction: column; gap: 10px; }
    .product-card { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px; text-decoration: none; color: var(--text); transition: all 0.2s; }
    .product-card:active { transform: scale(0.98); border-color: var(--accent); }
    .product-img { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; background: #f5f5f5; flex-shrink: 0; }
    .product-img-placeholder { width: 64px; height: 64px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .product-info { flex: 1; min-width: 0; }
    .product-category { font-size: 11px; color: var(--accent); font-weight: 500; margin-bottom: 3px; }
    .product-name { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-desc { font-size: 12px; color: var(--text-sub); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-arrow { font-size: 14px; color: #ccc; flex-shrink: 0; }
    .empty { text-align: center; padding: 40px 0; color: var(--text-sub); font-size: 14px; }
    .empty-emoji { font-size: 36px; margin-bottom: 10px; }
    .loading { text-align: center; padding: 40px 0; color: var(--text-sub); font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-emoji">🐹</div>
      <h1>옌이 제품 링크 모음</h1>
      <p>솔직한 리뷰만 올려요</p>
    </div>

    <div class="notice">
      💡 이 페이지의 링크는 제휴마케팅 활동의 일환으로, 링크를 통해 구매 시 일정 수수료를 제공받을 수 있습니다.
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="제품명으로 검색해요" oninput="render()">
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" onclick="filterCategory('전체', this)">전체</button>
    </div>

    <div class="product-list" id="productList">
      <div class="loading">🐹 불러오는 중...</div>
    </div>
  </div>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbz4iSl8RUc8EVtFuC0ORWPcNm9TZ6BCYw-XREGO9i615kRajxk1jUlAVMMAN-G_LsimXA/exec';
    let products = [];
    let currentCategory = '전체';

    async function loadProducts() {
      try {
        const res = await fetch(API);
        products = await res.json();
        buildTabs();
        render();
      } catch (e) {
        document.getElementById('productList').innerHTML = '<div class="empty"><div class="empty-emoji">😢</div><p>데이터를 불러올 수 없어요</p></div>';
      }
    }

    function buildTabs() {
      const categories = ['전체', ...new Set(products.map(p => p.category).filter(Boolean))];
      document.getElementById('tabs').innerHTML = categories.map((cat, i) =>
        `<button class="tab ${i === 0 ? 'active' : ''}" onclick="filterCategory('${cat}', this)">${cat}</button>`
      ).join('');
    }

    function filterCategory(cat, el) {
      currentCategory = cat;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function render() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = products.filter(p => {
        const matchCat = currentCategory === '전체' || p.category === currentCategory;
        const matchQuery = (p.name || '').toLowerCase().includes(query) || (p.desc || '').toLowerCase().includes(query);
        return matchCat && matchQuery;
      });

      const list = document.getElementById('productList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty"><div class="empty-emoji">🐹</div><p>검색 결과가 없어요</p></div>';
        return;
      }

      list.innerHTML = filtered.map(p => `
        <a class="product-card" href="${p.link}" target="_blank" rel="noopener">
          ${p.image
            ? `<img class="product-img" src="${p.image}" alt="${p.name}" onerror="this.outerHTML='<div class=\\'product-img-placeholder\\'>🛒</div>'">`
            : `<div class="product-img-placeholder">🛒</div>`}
          <div class="product-info">
            <div class="product-category">${p.category || ''}</div>
            <div class="product-name">${p.name}</div>
            ${p.desc ? `<div class="product-desc">${p.desc}</div>` : ''}
          </div>
          <div class="product-arrow">›</div>
        </a>
      `).join('');
    }

    loadProducts();
  </script>
</body>
</html>
